# Manual resource - toBodyPutDelete, Create
---
name: Intrusion Policy Group Override
rest_endpoint: /api/fmc_config/v1/domain/{DOMAIN_UUID}/policy/intrusionpolicies/%v/intrusionrulegroups
put_create: true
put_delete: true
doc_category: Policies
skip_minimum_test: true
attributes:
  - tf_name: intrusion_policy_id
    type: String
    reference: true
    description: Id of the Intrusion Policy.
    example: 76d24097-41c4-4558-a4d0-a8c07ac08470
    test_value: fmc_intrusion_policy.test.id
  - model_name: id
    tf_name: intrusion_rule_group_id
    type: String
    description: Id of the overridden Intrusion Rule Group.
    example: 76d24097-41c4-4558-a4d0-a8c07ac08471
    mandatory: true
    test_value: fmc_intrusion_rule_group.test.id
  - model_name: type
    type: String
    description: Type of the object; this value is always 'IntrusionRuleGroup'.
    computed: true
  - model_name: defaultSecurityLevel
    tf_name: default_security_level
    type: String
    description: Default security level.
    computed: true
  - model_name: overrideSecurityLevel
    tf_name: override_security_level
    type: String
    description: Overriden security level.
    enum_values: [DISABLED, LEVEL_1, LEVEL_2, LEVEL_3, LEVEL_4, DEFAULT]
    example: LEVEL_2
    mandatory: true

test_prerequisites: |-
  data "fmc_intrusion_policy" "builtin" {
    name = "Balanced Security and Connectivity"
  }

  resource "fmc_intrusion_policy" "test" {
    name        = "Intrusion Policy Group Override"
    base_policy_id = data.fmc_intrusion_policy.builtin.id
  }

  resource "fmc_intrusion_rule_group" "test" {
    name = "Intrusion Policy Group Override"
  }
