# Manual resource - toBodyPutDelete, Create
---
name: Intrusion Policy Group Override
rest_endpoint: /api/fmc_config/v1/domain/{DOMAIN_UUID}/policy/intrusionpolicies/%v/intrusionrulegroups
put_create: true
put_delete: true
doc_category: Policies
adjust_body: true
skip_minimum_test: true
attributes:
  - tf_name: intrusion_policy_id
    type: String
    reference: true
    description: Id of the parent Intrusion Policy.
    example: 76d24097-41c4-4558-a4d0-a8c07ac08470
  - model_name: id
    tf_name: intrusion_rule_group_id
    type: String
    description: Id of the parent Intrusion Rule Group.
    example: 76d24097-41c4-4558-a4d0-a8c07ac08471
    mandatory: true
  - model_name: type
    type: String
    description: Type of the object; this value is always 'IntrusionRuleGroup'.
    computed: true
  - model_name: defaultSecurityLevel
    type: String
    description: Default security.
    computed: true
  - model_name: overrideSecurityLevel
    type: String
    description: Security level override for the rule group.
    enum_values: [DISABLED, LEVEL_1, LEVEL_2, LEVEL_3, LEVEL_4, DEFAULT]
    example: LEVEL_3
    mandatory: true
