---
name: FQDN Overrides
rest_endpoint: /api/fmc_config/v1/domain/{DOMAIN_UUID}/object/fqdns
is_override: true
doc_category: Objects
test_tags: [TF_VAR_device_id]
attributes:
  - model_name: name
    tf_name: parent_name
    type: String
    mandatory: true
    description: Name of the parent FQDN object.
    example: my_fqdn
    data_source_query: true
    requires_replace: true
    test_value: fmc_fqdn.test.name
  - model_name: id
    data_path: ["overrides", "parent"]
    tf_name: parent_id
    type: String
    mandatory: true
    description: ID of the parent FQDN object.
    example: 12345678-90ab-cdef-1234-567890abcdef
    requires_replace: true
    test_value: fmc_fqdn.test.id
  - model_name: dummy_overrides
    tf_name: overrides
    type: List
    description: Override entries for the object.
    max_list: 1000
    mandatory: true
    attributes:
    - model_name: id
      data_path: ["overrides", "target"]
      tf_name: target_id
      type: String
      id: true
      mandatory: true
      description: ID of the override target Device or Domain. Note that each target can be defined once only.
      example: 12345678-90ab-cdef-1234-567890abcdef
      test_value: var.device_id
    - model_name: type
      data_path: ["overrides", "target"]
      tf_name: target_type
      type: String
      mandatory: true
      enum_values: ["Device", "Domain"]
      description: Type of the target.
      example: Device
    - model_name: description
      type: String
      description: Description of the overridden object.
      example: My FQDN object
    - model_name: value
      tf_name: fqdn
      type: String
      mandatory: true
      description: FQDN of the object.
      example: sub.example.com

test_prerequisites: |-
  variable "device_id" { default = null } // tests will set $TF_VAR_device_id

  resource "fmc_fqdn" "test" {
    name        = "my_fqdn_override"
    fqdn        = "example.com"
    overridable = true
  }
