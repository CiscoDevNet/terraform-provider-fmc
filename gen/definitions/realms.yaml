---
name: Realms
rest_endpoint: /api/fmc_config/v1/domain/{DOMAIN_UUID}/object/realms
ds_description: This data source reads the Realms, including built-in ones like Special Identities.
no_resource: true
no_import: true
is_bulk: true
doc_category: Integrations
attributes:
  - model_name: items
    type: Map
    description: >-
      Map of Realms. The key of the map is the name of the individual Realm.
    map_key_example: My Realm
    mandatory: true
    attributes:
      - model_name: id
        type: String
        resource_id: true
        description: Id of the Realm.
        exclude_example: true
        exclude_test: true
      - model_name: type
        type: String
        description: Type of the object; this value is always 'Realm'.
        computed: true
