# Manual resource - Create, toBodyPutDelete
---
name: Intrusion Policy Rule Override
rest_endpoint: /api/fmc_config/v1/domain/{DOMAIN_UUID}/policy/intrusionpolicies/%v/intrusionrules
put_create: true
put_delete: true
doc_category: Policies
skip_minimum_test: true
attributes:
  - tf_name: intrusion_policy_id
    type: String
    reference: true
    description: Id of the Intrusion Policy.
    example: 76d24097-41c4-4558-a4d0-a8c07ac08470
    test_value: fmc_intrusion_policy.test.id
  - model_name: id
    tf_name: intrusion_rule_id
    type: String
    description: Id of the overridden Intrusion Rule.
    example: 76d24097-41c4-4558-a4d0-a8c07ac08471
    mandatory: true
    test_value: fmc_intrusion_rule.test.id
  - model_name: type
    type: String
    description: Type of the object; this value is always 'IntrusionRule'.
    computed: true
  - model_name: defaultState
    tf_name: default_rule_action
    type: String
    description: Default rule action.
    computed: true
  - model_name: overrideState
    tf_name: override_rule_action
    type: String
    description: Overriden rule action.
    enum_values: [DROP, BLOCK, ALERT, DISABLE, DEFAULT, PASS, REJECT, REACT, REWRITE]
    example: BLOCK
    mandatory: true
  - model_name: ruleData
    type: String
    description: Snort formatted rule data.
    mandatory: true
    example: 'alert icmp any any -> any any ( sid:10000301; gid:2000; msg:\"CUSTOM RULE1\"; classtype:icmp-event; rev:1; )'
    test_value: fmc_intrusion_rule.test.rule_data

test_prerequisites: |-
  data "fmc_intrusion_policy" "builtin" {
    name = "Balanced Security and Connectivity"
  }

  resource "fmc_intrusion_policy" "test" {
    name        = "Intrusion Policy Rule Override"
    base_policy_id = data.fmc_intrusion_policy.builtin.id
  }

  resource "fmc_intrusion_rule_group" "test" {
    name = "Intrusion Policy Rule Override"
  }

  resource "fmc_intrusion_rule" "test" {
    rule_data = "alert icmp any any -> any any ( sid:10000303; gid:2000; msg:\"CUSTOM RULE3\"; classtype:icmp-event; rev:1; )"
    rule_groups = [
      { id = fmc_intrusion_rule_group.test.id }
    ]
  }
