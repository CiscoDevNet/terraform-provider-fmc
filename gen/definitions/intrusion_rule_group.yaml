---
name: Intrusion Rule Group
rest_endpoint: /api/fmc_config/v1/domain/{DOMAIN_UUID}/object/intrusionrulegroups
doc_category: Policies
attributes:
  - model_name: name
    type: String
    description: Name of the Intrusion Rule Group.
    mandatory: true
    example: my_intrusion_rule_group
    data_source_query: true
  - model_name: description
    type: String
    description: Description of the Intrusion Rule Group.
    example: "My IPS Rule Group"
    missing_in_response_if_set_to_empty_string: true
  - model_name: type
    type: String
    description: Type of the object; this value is always 'IntrusionRuleGroup'.
    computed: true
