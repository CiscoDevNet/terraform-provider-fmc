---
name: Intrusion Rules
rest_endpoint: /api/fmc_config/v1/domain/{DOMAIN_UUID}/object/intrusionrules
doc_category: Policies
is_bulk: true
minimum_version_bulk_delete: "999"
attributes:
  - model_name: items
    type: Map
    description: >-
      'Map of Intrusion Rules. The key of the map is the name of the individual Intrusion Rule. Use the name in gid:sid format (eg. 2000:10000301).'
    map_key_example: my_intrusion_rules
    mandatory: true
    attributes:
      - model_name: id
        type: String
        resource_id: true
        description: Id of the Intrusion Rule object.
        exclude_example: true
        exclude_test: true
      - model_name: ruleData
        type: String
        description: Snort formated rule data.
        mandatory: true
        example: 'alert icmp any any -> any any ( sid:10000301; gid:2000; msg:\"CUSTOM RULE1\"; classtype:icmp-event; rev:1; )'
      - model_name: ruleGroups
        type: List
        description: List of Intrusion Rule Groups this rule belongs to.
        mandatory: true
        attributes:
          - model_name: id
            type: String
            description: Id of the Intrusion Rule Group.
            mandatory: true
            example: 12da34567890-1234-5678-90ab-cdef12345678
          - model_name: name
            type: String
            description: Name of the Intrusion Rule Group.
            example: "Custom Rule Group 1"
      - model_name: type
        type: String
        description: Type of the object; this value is always 'IntrusionRule'.
        computed: true
