# Manual resource - Create
---
name: Access Category
rest_endpoint: /api/fmc_config/v1/domain/{DOMAIN_UUID}/policy/accesspolicies/%v/categories
doc_category: Policies
adjust_body: true
attributes:
  - model_name: access_control_policy_id
    type: String
    description: Id of the Access Control Policy.
    reference: true
    example: 76d24097-41c4-4558-a4d0-a8c07ac08470
    test_value: fmc_access_control_policy.test.id
  - model_name: name
    type: String
    mandatory: true
    description: Name of the Access Category.
    example: my_category
    data_source_query: true
  - model_name: type
    type: String
    description: Type of the object; this value is always 'Category'.
    computed: true
  - tf_name: section
    tf_only: true
    type: String
    description: Create the category in the given section.
    requires_replace: true
    exclude_test: true
    exclude_example: true
    enum_values: ["mandatory", "default"]
  - tf_name: insert_before_rule
    tf_only: true
    type: Int64
    description: >-
      Create the category above the given rule index.
      One of 'insert_before_rule', 'insert_after_rule', 'insert_before_category' can be set.
      This attribute is used for initial rule creation only and is ignored during the resource lifecycle.
    requires_replace: true
    exclude_test: true
    exclude_example: true
  - tf_name: insert_after_rule
    tf_only: true
    type: Int64
    description: >-
      Create the category below the given rule index.
      One of 'insert_before_rule', 'insert_after_rule', 'insert_before_category' can be set.
      This attribute is used for initial rule creation only and is ignored during the resource lifecycle.
    requires_replace: true
    exclude_test: true
    exclude_example: true
  - tf_name: insert_before_category
    tf_only: true
    type: String
    description: >-
      Create the category above the given category.
      One of 'insert_before_rule', 'insert_after_rule', 'insert_before_category' can be set.
      This attribute is used for initial rule creation only and is ignored during the resource lifecycle.
    requires_replace: true
    exclude_test: true
    exclude_example: true

test_prerequisites: |-
  resource "fmc_access_control_policy" "test" {
    name              = "access_category"
    default_action    = "BLOCK"
    manage_rules      = false
    manage_categories = false
  }
