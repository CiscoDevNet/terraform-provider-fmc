# FMCBUG CSCwt93493 FMC API: Identity Policy configuration is not applied on initial POST request
# FMCBUG CSCwt93472 FMC API: Identity Rules are not returned in order they are defined in the policy
# Manual resource - Create, Read, Update, Data Source Test
---
name: Identity Policy
rest_endpoint: /api/fmc_config/v1/domain/{DOMAIN_UUID}/policy/identitypolicies
doc_category: Policies
res_description: This resource manages Identity Policy with corresponding Categories and Rules.
skip_minimum_test: true
minimum_version: "7.2"
minimum_version_create: "10.0"
attributes:
  - model_name: name
    type: String
    mandatory: true
    description: Name of the Identity Policy.
    example: my_identity_policy
    data_source_query: true
  - model_name: type
    type: String
    description: Type of the object; this value is always 'IdentityPolicy'.
    computed: true
  - model_name: type
    type: String
    value: IdentityPolicy
  - model_name: description
    type: String
    description: Description of the Identity Policy.
    example: My Identity Policy
  - model_name: id
    data_path: [mappingFilter]
    tf_name: identity_mapping_filter_network_object_id
    type: String
    description: Id of the Host, Network or Network Group used as an Identity Mapping Filter.
    example: 12345678-90ab-cdef-1234-567890abcdef
    test_value: fmc_networks.test.items["id_policy_network1"].id
  - model_name: type
    data_path: [mappingFilter]
    tf_name: identity_mapping_filter_network_object_type
    type: String
    description: Type of the Host, Network or Network Group used as an Identity Mapping Filter.
    example: Network
    test_value: fmc_networks.test.items["id_policy_network1"].type

  # Active Authentication
  - model_name: id
    data_path: [authCert]
    tf_name: active_authentication_server_certificate_id
    type: String
    description: Id of the Internal Certificate object used as an active authentication server certificate.
    example: 12345678-90ab-cdef-1234-567890abcdef
    test_value: fmc_internal_certificate.test.id
  - model_name: type
    data_path: [authCert]
    tf_name: active_authentication_server_certificate_type
    type: String
    description: Type of the Internal Certificate object used as an active authentication server certificate.
    example: PKI_InternalCert
    enum_values: [PKI_InternalCert]
    default_value: PKI_InternalCert
  - model_name: id
    data_path: [redirectHost]
    tf_name: active_authentication_redirect_fqdn_id
    type: String
    description: Id of the FQDN object used for active authentication redirection (Redirect to Host Name). Supported only in Snort 3.0 or later.
    example: 12345678-90ab-cdef-1234-567890abcdef
    test_value: fmc_fqdn.test.id
  - model_name: type
    data_path: [redirectHost]
    tf_name: active_authentication_redirect_fqdn_type
    type: String
    description: Type of the FQDN object used for active authentication redirection.
    example: FQDN
    enum_values: [FQDN]
    default_value: FQDN
    test_value: fmc_fqdn.test.type
  - model_name: redirectPort
    tf_name: active_authentication_redirect_port
    type: Int64
    description: Port used for active authentication redirection. Valid values are 885 or 1025-65535.
    min_int: 885
    max_int: 65535
    example: 885
    default_value: 885
  - model_name: maxLoginAttempts
    tf_name: active_authentication_maximum_login_attempts
    type: Int64
    description: Maximum login attempts. Use 0 for unlimited attempts.
    example: 3
    default_value: 3
  - model_name: activeSessionSharing
    tf_name: active_authentication_session_sharing
    type: Bool
    description: Share active authentication sessions across firewalls. Supported only in 7.4.1 and later.
    example: true
    default_value: true
  - model_name: activeAuthPage
    tf_name: active_authentication_page
    type: String
    description: Active authentication page type.
    example: DEFAULT
    enum_values: [DEFAULT, CUSTOM]
    default_value: DEFAULT
  - model_name: htmlActiveAuthPage
    tf_name: active_authentication_page_html
    type: String
    description: Custom HTML content for the active authentication login page. Only used when `active_authentication_page` is set to 'CUSTOM'.
    exclude_example: true
    exclude_test: true
    default_value: '<!DOCTYPE html>\n<html>\n<head>\n<meta http-equiv=\"content-type\" content=\"text/html; charset=UTF-8\" />\n<title>Login</title>\n<style type=\"text/css\">\nbody {\n    margin:0;\n    font-family:verdana,sans-serif;\n}\nh1 {\n    margin:0;\n    padding:12px 25px;\n    background-color:#343434;\n    color:#ddd;\n}\np {\n    margin:12px 25px;\n}\nstrong {\n    color:#E0042D;\n}\ndiv {\n    padding-left:23px;\n    font-weight: normal;\n    font-size: 8pt;\n}\ninput {\n    margin:12px 25px;\n}\n</style>\n</head>\n<body>\n    <form action=\"\" id=\"loginForm\" method=\"post\" name=\"loginForm\">\n        <h1>Login</h1>\n        <p><strong>Please enter your username and password or log in as a guest.</strong></p>\n        <div class=\"label\">Username\n            <input id=\"name\" maxlength=\"100\" name=\"login\" type=\"text\" value=\"\"/>\n            <b>realm</b>\n            <select name=\"realm\" id=\"realm\"></select>\n        </div>\n        <div class=\"label\" id=\"label-password\">Password\n            <input id=\"pass\" name=\"pass\" type=\"password\" value=\"\"/>\n        </div>\n        <input id=\"submit-btn\" type=\"submit\" name=\"login_action\" value=\"Submit\"/>\n        <p><font size=2 >-or-</font></p>\n        <input id=\"login-btn\" type=\"submit\" name=\"guest_action\" value=\"Login as guest\"/>\n    </form>\n</body>\n</html>\n'

  # Categories
  - model_name: dummy_categories
    tf_name: categories
    type: List
    description: Ordered list of Categories created between default categories - Standard Rules and Root Rules. Do not include default categories in the list.
    ordered_list: true
    attributes:
      - model_name: id
        type: String
        description: Id of the Category.
        resource_id: true
        exclude_example: true
        exclude_test: true
      - model_name: name
        type: String
        description: Name of the Category.
        mandatory: true
        example: category_1
      - model_name: type
        type: String
        value: IdentityPolicyCategory

  # Rules
  - model_name: dummy_rules
    tf_name: rules
    type: List
    ordered_list: true
    description: Ordered list of Rules.
    attributes:
      - model_name: id
        type: String
        description: Id of the Identity Rule.
        resource_id: true
        exclude_example: true
        exclude_test: true
      - model_name: type
        type: String
        value: IdentityPolicyRule
      - model_name: name
        type: String
        description: Name of the Identity Rule.
        mandatory: true
        example: rule_1
      - model_name: enabled
        type: Bool
        description: Enable rule.
        example: true
      - model_name: category
        type: String
        mandatory: true
        description: Name of the Category the rule belongs to. Can be one of the default categories (Administrator, Standard or Root Rules) or user-defined one.
        example: category_1
        tf_only: true
      - model_name: authenticationType
        tf_name: authentication_type
        type: String
        description: Authentication type action for the rule.
        enum_values: ["PASSIVE", "ACTIVE", "NO"]
        example: PASSIVE
        mandatory: true

      # Realm & Settings
      - model_name: id
        data_path: [realm]
        tf_name: authentication_realm_id
        type: String
        description: Id of the Authentication Realm (AD/LDAP).
        example: 12345678-90ab-cdef-1234-567890abcdef
        test_value: fmc_realm_ad_ldap.test.id
      - model_name: type
        data_path: [realm]
        tf_name: authentication_realm_type
        type: String
        description: Type of the Authentication Realm.
        example: IdentityRealm
        enum_values: [IdentityRealm]
      - model_name: guestAccessFallback
        tf_name: guest_access_fallback
        type: Bool
        description: Identify as Special Identities/Guest if user cannot be authenticated.
        example: false
      - model_name: captivePortalFallback
        tf_name: active_authentication_fallback
        type: Bool
        description: Use active authentication if passive or VPN identity cannot be established.
        example: false
      - model_name: authenticationProtocol
        tf_name: authentication_protocol
        type: String
        description: Protocol used for active authentication.
        enum_values: ["HTTP_BASIC", "NTLM", "KERBEROS", "HTTP NEGOTIATE", "HTTP RESPONSE PAGE", "SAML"]
        exclude_test: true
      - model_name: excludedUserAgent
        tf_name: excluded_user_agents
        type: List
        description: List of excluded User Agents (Applications).
        exclude_test: true
        attributes:
          - model_name: id
            type: String
            id: true
            description: Id of the Application object.
            example: 12345678-90ab-cdef-1234-567890abcdef
            mandatory: true
          - model_name: type
            type: String
            description: Type of the Application object.
            example: Application
            enum_values: [Application]
            mandatory: true
      
      # Match criteria
      - model_name: sourceZones
        tf_name: source_zones
        description: Source Security Zones.
        type: Set
        attributes:
          - model_name: id
            type: String
            description: Id of the Security Zone object.
            id: true
            example: 76d24097-41c4-4558-a4d0-a8c07ac08470
            mandatory: true
            test_value: fmc_security_zones.test.items["id_policy_security_zone1"].id
          - model_name: type
            type: String
            description: Type of the Security Zone object.
            default_value: SecurityZone
            example: SecurityZone
            enum_values: [SecurityZone]
            test_value: fmc_security_zones.test.items["id_policy_security_zone1"].type
      - model_name: destinationZones
        tf_name: destination_zones
        description: Destination Security Zones.
        type: Set
        exclude_test: true
        attributes:
          - model_name: id
            type: String
            description: Id of the Security Zone object.
            id: true
            example: 76d24097-41c4-4558-a4d0-a8c07ac08470
            mandatory: true
            test_value: fmc_security_zones.test.items["id_policy_security_zone2"].id
          - model_name: type
            type: String
            description: Type of the Security Zone object.
            default_value: SecurityZone
            example: SecurityZone
            enum_values: [SecurityZone]
            test_value: fmc_security_zones.test.items["id_policy_security_zone2"].type
      - model_name: literals
        data_path: [sourceNetworks]
        tf_name: source_network_literals
        description: Source Network literals.
        type: Set
        attributes:
          - model_name: type
            type: String
            description: Type of the Network Object.
            example: Network
            enum_values: [Host, Network]
            mandatory: true
          - model_name: value
            type: String
            id: true
            description: IP address or network in CIDR format.
            example: 10.1.1.0/24
            mandatory: true
      - model_name: objects
        data_path: [sourceNetworks]
        tf_name: source_network_objects
        description: Objects that represent sources of traffic (Host, Network, Range, FQDN, Network Group, Country, Continent or Geolocation).
        type: Set
        attributes:
          - model_name: id
            type: String
            description: Id of the Network Object.
            id: true
            example: 76d24097-41c4-4558-a4d0-a8c07ac08470
            test_value: fmc_networks.test.items["id_policy_network2"].id
            mandatory: true
          - model_name: type
            type: String
            description: Type of the Network Object.
            example: Network
            test_value: fmc_networks.test.items["id_policy_network2"].type
            mandatory: true
      - model_name: literals
        data_path: [destinationNetworks]
        tf_name: destination_network_literals
        description: Destination Network literals.
        type: Set
        attributes:
          - model_name: type
            type: String
            description: Type of the Network Object.
            example: Network
            enum_values: [Host, Network]
            mandatory: true
          - model_name: value
            type: String
            id: true
            description: IP address or network in CIDR format.
            example: 10.2.2.0/24
            mandatory: true
      - model_name: objects
        data_path: [destinationNetworks]
        tf_name: destination_network_objects
        description: Objects that represent destinations of traffic (Host, Network, Range, FQDN, Network Group, Country, Continent or Geolocation).
        type: Set
        attributes:
          - model_name: id
            type: String
            description: Id of the Network Object.
            id: true
            example: 76d24097-41c4-4558-a4d0-a8c07ac08470
            test_value: fmc_networks.test.items["id_policy_network3"].id
            mandatory: true
          - model_name: type
            type: String
            description: Type of the Network Object.
            example: Network
            test_value: fmc_networks.test.items["id_policy_network3"].type
            mandatory: true
      - model_name: literals
        data_path: [vlanTags]
        tf_name: vlan_tag_literals
        description: VLAN Tag literals.
        type: Set
        attributes:
          - model_name: type
            type: String
            description: Type of the VLAN tag literal.
            example: VlanTagLiteral
            enum_values: [VlanTagLiteral]
            default_value: VlanTagLiteral
          - model_name: startTag
            type: String
            example: "11"
            description: Start of the VLAN tag range.
            mandatory: true
          - model_name: endTag
            type: String
            example: "22"
            description: End of the VLAN tag range.
            mandatory: true
      - model_name: objects
        data_path: [vlanTags]
        tf_name: vlan_tag_objects
        description: VLAN Tag objects.
        type: Set
        attributes:
          - model_name: id
            type: String
            description: Id of the VLAN Tag object.
            id: true
            example: 76d24097-41c4-4558-a4d0-a8c07ac08470
            test_value: fmc_vlan_tag.test.id
            mandatory: true
          - model_name: type
            type: String
            description: Type of the VLAN Tag object.
            example: VlanTag
            test_value: fmc_vlan_tag.test.type
            enum_values: [VlanTag, VlanGroupTag]
            mandatory: true
      - model_name: literals
        data_path: [sourcePorts]
        tf_name: source_port_literals
        description: Source Port literals.
        type: Set
        attributes:
          - model_name: type
            type: String
            description: Type of the port literal.
            example: PortLiteral
            default_value: PortLiteral
            enum_values: [PortLiteral]
          - model_name: protocol
            type: String
            example: "6"
            enum_values: ["6", "17"]
            mandatory: true
            description: IANA protocol number.
          - model_name: port
            type: String
            example: "80"
            description: Port number.
      - model_name: objects
        data_path: [sourcePorts]
        tf_name: source_port_objects
        description: Source Port objects.
        type: Set
        exclude_test: true
        attributes:
          - model_name: id
            type: String
            description: Id of the Port object.
            id: true
            example: 76d24097-41c4-4558-a4d0-a8c07ac08470
            test_value: fmc_ports.test.items["id_policy_TCP_12088"].id
            mandatory: true
          - model_name: type
            type: String
            description: Type of the Port object.
            enum_values: [ProtocolPortObject]
            default_value: ProtocolPortObject
            example: ProtocolPortObject
            test_value: fmc_ports.test.items["id_policy_TCP_12088"].type
      - model_name: literals
        data_path: [destinationPorts]
        tf_name: destination_port_literals
        description: Destination Port literals.
        type: Set
        attributes:
          - model_name: type
            type: String
            enum_values: [PortLiteral]
            example: PortLiteral
            default_value: PortLiteral
            description: Type of the port literal.
          - model_name: port
            type: String
            example: "80"
            description: Port number.
          - model_name: protocol
            type: String
            example: "6"
            mandatory: true
            description: IANA protocol number.
      - model_name: objects
        data_path: [destinationPorts]
        tf_name: destination_port_objects
        description: Destination Port objects.
        type: Set
        exclude_test: true
        attributes:
          - model_name: id
            type: String
            description: Id of the Port object.
            id: true
            example: 76d24097-41c4-4558-a4d0-a8c07ac08470
            test_value: fmc_ports.test.items["id_policy_TCP_1088"].id
            mandatory: true
          - model_name: type
            type: String
            description: Type of the Port object.
            enum_values: [ProtocolPortObject]
            default_value: ProtocolPortObject
            example: ProtocolPortObject
            test_value: fmc_ports.test.items["id_policy_TCP_1088"].type

test_prerequisites: |
  resource "fmc_networks" "test" {
    items = {
      "id_policy_network1" = { prefix = "10.1.1.0/24" },
      "id_policy_network2" = { prefix = "10.1.2.0/24" },
      "id_policy_network3" = { prefix = "10.1.3.0/24" }
    }
  }

  resource "fmc_internal_certificate" "test" {
    name        = "id_policy_my_internal_cert"
    certificate = local.cert
    private_key = local.cert_key
  }

  resource "fmc_fqdn" "test" {
    name = "id_policy_fqdn"
    fqdn = "id.example.com"
  }

  resource "fmc_realm_ad_ldap" "test" {
    name               = "id_policy_realm"
    enabled            = true
    realm_type         = "LDAP"
    directory_username = "fmctf@example.cisco.com"
    directory_password = "Cisco123!"
    base_dn            = "DC=example,DC=cisco,DC=com"
    group_dn           = "CN=Users,DC=example,DC=cisco,DC=com"

    directory_servers = [
      {
        hostname                        = "10.62.158.5"
        port                            = 389
        encryption_protocol             = "NONE"
      },
    ]
  }

  resource "fmc_security_zones" "test" {
    items = {
      "id_policy_security_zone1" = { interface_type = "ROUTED" },
      "id_policy_security_zone2" = { interface_type = "ROUTED" },
    }
  }

  resource "fmc_vlan_tag" "test" {
    name = "id_policy_vlan_tag"
    start_tag = "10"
    end_tag = "10"
  }

  resource "fmc_ports" "ports" {
    items = {
      "id_policy_TCP_12088" = { protocol = "TCP", port = 12088 },
      "id_policy_TCP_1088" = { protocol = "TCP", port = 1088 },
    }
  }

