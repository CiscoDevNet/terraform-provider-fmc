# FMCBUG: Bulk POST is broken, hence no resource
# FMCBUG: Get incorrectly gets number of objects, so hardcoding limit to 1000 for now
# Manual resource - Data Source (Read)
---
name: Intrusion Rule Groups
rest_endpoint: /api/fmc_config/v1/domain/{DOMAIN_UUID}/object/intrusionrulegroups
doc_category: Policies
is_bulk: true
no_resource: true
minimum_version_bulk_delete: "999"
attributes:
  - model_name: items
    type: Map
    description: >-
      Map of Intrusion Rule Groups. The key of the map is the name of the individual Intrusion Rule Group.
    map_key_example: my_intrusion_rule_groups
    mandatory: true
    attributes:
      - model_name: id
        type: String
        resource_id: true
        description: Id of the Intrusion Rule Group object.
        exclude_example: true
        exclude_test: true
      - model_name: description
        type: String
        description: Description of the Intrusion Rule Group.
        example: "My IPS Rule Group"
        missing_in_response_if_set_to_empty_string: true
      - model_name: type
        type: String
        description: Type of the object; this value is always 'IntrusionRuleGroup'.
        computed: true
